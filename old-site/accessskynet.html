    function include_js_or_css(filepath, frequency_of_updations = "") {
        return new Promise((resolve, reject) => {
            if (frequency_of_updations != "") {
                if (filepath.includes("?"))
                    filepath += "&system_cache_version=" + (system_js_cache_erase.includes(frequency_of_updations) ? system_rnfjc : system_js_cache_erase);
                else
                    filepath += "?system_cache_version=" + (system_js_cache_erase.includes(frequency_of_updations) ? system_rnfjc : system_js_cache_erase);
            }

            const basepath = filepath.split("?")[0];
            const fileext = basepath.split('.').pop().toLowerCase();

            if (fileext == "js" || fileext == "info") {
                const script = document.createElement('script');
                script.src = filepath;
                script.type = "text/javascript";
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            } else {
                const link = document.createElement('link');
                link.rel = "stylesheet";
                link.href = filepath;
                document.head.appendChild(link);
                resolve(); // CSS doesn't block, assume success
            }
        });
    }


    function include(filepath, frequency_of_updations = "") {
        return include_js_or_css(filepath, frequency_of_updations);
    }

    function mb_strimwidth(string, start, width, trimmarker) {
        var trimmakerWidth = mb_strwidth(trimmarker),
            i = start,
            l = string.length,
            trimmedLength = 0,
            trimmedStr = "";
        for (; i < l; i++) {
            var c = string.charAt(i),
                charWidth = mb_strwidth(c),
                next = string.charAt(i + 1),
                nextWidth = mb_strwidth(next);
            trimmedLength += charWidth;
            trimmedStr += c;
            if (trimmedLength + trimmakerWidth + nextWidth > width) {
                trimmedStr += trimmarker;
                break;
            }
        }
        return trimmedStr;
    }

    function mb_strwidth(str) {
        var l = str.length,
            c = "",
            length = 0;
        for (var i = 0; i < l; i++) {
            c = str.charCodeAt(i);
            if (0x0000 <= c && c <= 0x0019) {
                length += 0;
            } else if (0x0020 <= c && c <= 0x1fff) {
                length += 1;
            } else if (0x2000 <= c && c <= 0xff60) {
                length += 2;
            } else if (0xff61 <= c && c <= 0xff9f) {
                length += 1;
            } else if (0xffa0 <= c) {
                length += 2;
            }
        }
        return length;
    }
